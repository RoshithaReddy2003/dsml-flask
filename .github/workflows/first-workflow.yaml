name: First Test on AWS

on:
  push:
    branches: 
      - main 


jobs:
  
  job1:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # some of inbult functions, provided by github fro dooing some of the basic tasks checkout means make a copy of the code of the repo
      
      - name: Install python3
        uses: actions/setup-python@v2
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt

      - name: Run tests
        run: pytest 

  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - name: login to docker hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: build docker image and push to docker hub
          uses: docker/build-push-action@v3
          with:
            push: true
            tags: roshithareddy/dsml-flask:latest

